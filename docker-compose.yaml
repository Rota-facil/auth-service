services:
  auth-database:
    image: postgres:16
    container_name: auth-database

    environment:
      POSTGRES_DB: ${DATASOURCE_NAME}
      POSTGRES_USER: ${DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${DATASOURCE_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - auth-db-data:/var/lib/postgresql/data

volumes:
  auth-db-data: