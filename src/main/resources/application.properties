spring.application.name=auth-service
server.servlet.context-path=/auth
server.port=8084

# GOOGLE
# Configuração do OAuth2 para o Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8084/auth/login/oauth2/code/{registrationId}

# DATABASE
spring.datasource.url=${AUTH_DATASOURCE_URL:jdbc:postgresql://localhost:5434/auth_database}
spring.datasource.username=${DATASOURCE_USERNAME:rota-facil}
spring.datasource.password=${DATASOURCE_PASSWORD:admin}


# JPA + HIBERNATE
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


#FLYWAY
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.log-resolvers=true

#  EUREKA
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8081/eureka}
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.client.fetch-registry=true


# RABBIMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:rota-facil}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:admin}

# auth exchange
rabbitmq.auth.exchange={RABBITMQ_AUTH_EXCHANGE:auth.events}
# routing keys
rabbitmq.user.created.routing.key=${RABBITMQ_USER_CREATED_ROUTING_KEY:user.created}
rabbitmq.user.updated.routing.key=${RABBITMQ_USER_UPDATED_ROUTING_KEY:user.updated}
rabbitmq.user.deleted.routing.key=${RABBITMQ_USER_DELETED_ROUTING_KEY:user.deleted}
rabbitmq.user.email.changed.routing.key=${RABBITMQ_USER_EMAIL_CHANGED_ROUTING_KEY:user.email.changed}

rabbitmq.prefecture.created.routing.key=${RABBITMQ_PREFECTURE_CREATED_ROUTING_KEY:prefecture.created}
rabbitmq.prefecture.updated.routing.key=${RABBITMQ_PREFECTURE_UPDATED_ROUTING_KEY:prefecture.updated}
rabbitmq.prefecture.deleted.routing.key=${RABBITMQ_PREFECTURE_DELETED_ROUTING_KEY:prefecture.deleted}


# security
security.private.key=${SECURITY_PRIVATE_KEY:}


# OBSERVABILITY
# tracing
management.tracing.enabled=true
management.tracing.sampling.probability=1.0

# metrics
management.otlp.metrics.export.enabled=true

# collector
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces
management.otlp.metrics.export.url=http://localhost:4318/v1/metrics

# SWAGGER
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

logging.file.name=logs/gateway.log